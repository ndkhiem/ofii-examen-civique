let quiz=[]
let index=0
let score=0
let timer
let timeLeft=2700

function startExam(){
quiz=getRandomQuestions(questionBank,40)
index=0
score=0
timeLeft=2700
startTimer()
showQuestion()
}

function startTimer(){

updateTimer()

clearInterval(timer)

timer=setInterval(()=>{

timeLeft--

updateTimer()

if(timeLeft<=0)finishExam()

},1000)

}

function updateTimer(){

let m=Math.floor(timeLeft/60)

let s=timeLeft%60

document.getElementById("timer").innerText=

"Temps restant: "+m+":"+String(s).padStart(2,"0")

}

function showQuestion(){

if(index>=quiz.length){finishExam();return}

let q=quiz[index]

let answers=q.a.map((t,i)=>({t,i}))

answers=answers.sort(()=>Math.random()-0.5)

let html="<h3>"+(index+1)+"/40</h3><p>"+q.q+"</p>"

answers.forEach(a=>{

html+="<button class='answer' onclick='answer("+a.i+")'>"+a.t+"</button>"

})

document.getElementById("progress").innerText="Question "+(index+1)+" / 40"

document.getElementById("app").innerHTML=html

}

function answer(i){

let q=quiz[index]

if(i===q.c)score++

index++

showQuestion()

}

function finishExam(){

clearInterval(timer)

let percent=Math.round(score/40*100)

let pass=score>=32?"PASS":"FAIL"

let html="<div class='result'>"

html+="Score: "+score+"/40 ("+percent+"%)<br><br>"

html+=pass+"<br><br>"

html+="<button class='primary' onclick='startExam()'>Repasser</button>"

html+="</div>"

document.getElementById("app").innerHTML=html

}

function startScreen(){

let html="<h2>Examen Civique CR</h2>"

html+="<p>40 questions • 45 minutes</p>"

html+="<button class='primary' onclick='startExam()'>Commencer examen</button>"

document.getElementById("app").innerHTML=html

}

startScreen()
