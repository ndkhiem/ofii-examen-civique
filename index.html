<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFII Civique Trainer</title>
<style>
body{font-family:Arial;background:#f2f4f8;margin:0;padding:0}
header{background:#2563eb;color:white;text-align:center;padding:15px;font-size:20px}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,0.1)}
button{padding:12px;margin:6px 0;border:none;border-radius:8px;cursor:pointer;font-size:16px;width:100%}
.answer{background:#eef2ff}
.answer:hover{background:#dbe4ff}
.primary{background:#2563eb;color:white}
.secondary{background:#e5e7eb}
#timer{text-align:center;font-weight:bold;margin-bottom:10px}
#progress{text-align:center;margin-bottom:10px}
.flash{text-align:center;font-size:22px;padding:30px}
.result{text-align:center;font-size:22px}
</style>
</head>
<body>
<header>OFII Examen Civique Trainer</header>
<div class="container">
<div id="timer"></div>
<div id="progress"></div>
<div id="app" class="card"></div>
</div>

<script>

const questionBank=[
{q:"Quelle est la devise de la République française ?",a:["Liberté Égalité Fraternité","Travail Famille Patrie","France Nation","Unité Justice"],c:0},
{q:"Quel animal est un symbole de la France ?",a:["Le coq","Le lion","L’aigle","L’ours"],c:0},
{q:"Quelle est la date de la fête nationale française ?",a:["14 juillet","1 mai","8 mai","11 novembre"],c:0},
{q:"Quelle est la langue officielle de la République française ?",a:["Français","Anglais","Espagnol","Allemand"],c:0},
{q:"Qui nomme le Premier ministre ?",a:["Le Président","Le Parlement","Les citoyens","Le Sénat"],c:0},
{q:"Qui vote les lois ?",a:["Le Parlement","La police","Le maire","Le Président"],c:0},
{q:"Quel est l'âge minimum pour voter ?",a:["18 ans","16 ans","21 ans","25 ans"],c:0},
{q:"Que signifie la laïcité ?",a:["Neutralité de l'État envers les religions","Religion obligatoire","Religion officielle","Interdiction religion"],c:0},
{q:"Qui élit les députés ?",a:["Les citoyens","Le Sénat","Le Président","Les juges"],c:0},
{q:"Quel est le rôle du maire ?",a:["Diriger la commune","Diriger l'État","Diriger l’armée","Diriger l’Europe"],c:0},
{q:"Qui a rendu l'école gratuite et obligatoire ?",a:["Jules Ferry","Napoléon","Victor Hugo","Charles de Gaulle"],c:0},
{q:"En quelle année l’esclavage a-t-il été aboli définitivement en France ?",a:["1848","1789","1914","1958"],c:0},
{q:"Quel numéro permet d'appeler le SAMU ?",a:["15","17","18","112"],c:0},
{q:"Quel est le salaire minimum légal en France ?",a:["SMIC","RSA","CAF","TVA"],c:0},
{q:"Qui rembourse les frais médicaux ?",a:["Sécurité sociale","La mairie","La police","La préfecture"],c:0},
{q:"Qui était Victor Hugo ?",a:["Un écrivain","Un roi","Un scientifique","Un peintre"],c:0},
{q:"Qui était Marie Curie ?",a:["Une scientifique","Une chanteuse","Une reine","Une actrice"],c:0},
{q:"Quelle mer sépare la France et l’Angleterre ?",a:["La Manche","L'Atlantique","La mer du Nord","La Méditerranée"],c:0},
{q:"Quelle est la plus haute montagne de France ?",a:["Mont Blanc","Ventoux","Puy de Dôme","Pic du Midi"],c:0},
{q:"Quelle institution règle les conflits entre salariés et employeurs ?",a:["Le Conseil des Prud’hommes","La police","La mairie","La préfecture"],c:0}
];

function getRandomQuestions(bank,n){
const shuffled=[...bank].sort(()=>Math.random()-0.5)
return shuffled.slice(0,n)
}

let quiz=[]
let index=0
let score=0
let wrong=[]
let timer
let timeLeft=2700

function startExam(){
quiz=getRandomQuestions(questionBank,Math.min(40,questionBank.length))
index=0
score=0
wrong=[]
timeLeft=2700
startTimer()
showQuestion()
}

function startTimer(){
updateTimer()
clearInterval(timer)
timer=setInterval(()=>{
timeLeft--
updateTimer()
if(timeLeft<=0){finishExam()}
},1000)
}

function updateTimer(){
let m=Math.floor(timeLeft/60)
let s=timeLeft%60
document.getElementById("timer").innerText="Temps restant: "+m+":"+String(s).padStart(2,"0")
}

function showQuestion(){
if(index>=quiz.length){finishExam();return}
let q=quiz[index]
let answers=q.a.map((t,i)=>({t,i}))
answers=answers.sort(()=>Math.random()-0.5)
let html="<h3>"+(index+1)+"/"+quiz.length+"</h3><p>"+q.q+"</p>"
answers.forEach(a=>{
html+="<button class='answer' onclick='answer("+a.i+")'>"+a.t+"</button>"
})
document.getElementById("progress").innerText="Question "+(index+1)+" / "+quiz.length
document.getElementById("app").innerHTML=html
}

function answer(i){
let q=quiz[index]
if(i===q.c){score++}else{wrong.push(q)}
index++
showQuestion()
}

function finishExam(){
clearInterval(timer)
let percent=Math.round(score/quiz.length*100)
let pass=score>=Math.ceil(quiz.length*0.8)?"PASS":"FAIL"
let html="<div class='result'>"
html+="Score: "+score+"/"+quiz.length+" ("+percent+"%)<br><br>"
html+=pass+"<br><br>"
html+="<button class='primary' onclick='startExam()'>Repasser</button>"
html+="<button class='secondary' onclick='review()'>Review erreurs</button>"
html+="</div>"
document.getElementById("app").innerHTML=html
}

function review(){
if(wrong.length===0){alert("Aucune erreur");return}
let html="<h3>Erreurs</h3>"
wrong.forEach(q=>{
html+="<p>"+q.q+"<br><b>"+q.a[q.c]+"</b></p>"
})
document.getElementById("app").innerHTML=html
}

function startScreen(){
let html="<h2>Simulation examen civique</h2>"
html+="<p>40 questions • 45 minutes</p>"
html+="<button class='primary' onclick='startExam()'>Commencer examen</button>"
document.getElementById("app").innerHTML=html
}

startScreen()

</script>
</body>
</html>
