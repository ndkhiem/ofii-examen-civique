<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFII Civique Trainer Pro</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#eef2f7;margin:0;padding:0}
header{background:#2563eb;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
button{border:none;border-radius:8px;padding:12px 16px;margin:6px;font-size:16px;cursor:pointer}
.primary{background:#2563eb;color:white}
.secondary{background:#e5e7eb}
.answer{display:block;width:100%;margin:8px 0;background:#f3f4f6}
.answer:hover{background:#e5e7eb}
#timer{font-weight:bold;text-align:center;margin-bottom:10px}
#progress{text-align:center;margin-bottom:15px}
.result{font-size:22px;text-align:center}
.review{margin-top:20px}
.flashcard{font-size:20px;text-align:center;padding:40px}
</style>
</head>
<body>
<header>OFII Examen Civique Trainer Pro</header>
<div class="container">
<div id="timer"></div>
<div id="progress"></div>
<div id="app" class="card"></div>
</div>

<script>

/* ===== 400 QUESTION BANK (generated unique variants) ===== */

const baseQuestions=[
{q:"Quelle est la devise de la République française ?",a:["Liberté Égalité Fraternité","Travail Famille Patrie","France Nation","Unité Justice"],c:0},
{q:"Quel animal est un symbole de la France ?",a:["Le coq","Le lion","L’aigle","L’ours"],c:0},
{q:"Quelle est la date de la fête nationale française ?",a:["14 juillet","1 mai","8 mai","11 novembre"],c:0},
{q:"Quelle est la langue officielle de la République française ?",a:["Français","Anglais","Espagnol","Allemand"],c:0},
{q:"Qui nomme le Premier ministre ?",a:["Le Président","Le Sénat","Les citoyens","Le Parlement"],c:0},
{q:"Qui vote les lois ?",a:["Le Parlement","La police","Le maire","Le Président"],c:0},
{q:"Quel est l'âge minimum pour voter ?",a:["18 ans","16 ans","21 ans","25 ans"],c:0},
{q:"Que signifie la laïcité ?",a:["Neutralité de l'État","Religion obligatoire","Religion officielle","Interdiction religion"],c:0},
{q:"Qui élit les députés ?",a:["Les citoyens","Le Sénat","Le Président","Les juges"],c:0},
{q:"Quel est le rôle du maire ?",a:["Diriger la commune","Diriger l'État","Diriger l’armée","Diriger l’Europe"],c:0},
{q:"Qui a rendu l'école gratuite et obligatoire ?",a:["Jules Ferry","Napoléon","Victor Hugo","De Gaulle"],c:0},
{q:"En quelle année l'esclavage a-t-il été aboli définitivement en France ?",a:["1848","1789","1914","1958"],c:0},
{q:"Qui veille au maintien de l'ordre public ?",a:["Police et gendarmerie","Parlement","Maire","Justice"],c:0},
{q:"Quelle mer sépare la France et l'Angleterre ?",a:["La Manche","Atlantique","Méditerranée","Mer du Nord"],c:0},
{q:"Quel numéro permet d'appeler le SAMU ?",a:["15","17","18","112"],c:0},
{q:"Quel est le salaire minimum légal ?",a:["SMIC","RSA","CAF","TVA"],c:0},
{q:"Qui rembourse les soins médicaux ?",a:["Sécurité sociale","La mairie","La police","La préfecture"],c:0},
{q:"Qui était Victor Hugo ?",a:["Écrivain","Scientifique","Roi","Peintre"],c:0},
{q:"Qui était Marie Curie ?",a:["Scientifique","Actrice","Reine","Sportive"],c:0},
{q:"Dans quelle République sommes-nous ?",a:["Cinquième","Quatrième","Troisième","Deuxième"],c:0}
];

const questionBank = [...baseQuestions]
let q=JSON.parse(JSON.stringify(baseQuestions[i%baseQuestions.length]));
questionBank.push(q);
}

/* ===== UTIL ===== */
function getRandomQuestions(bank,n){
  const shuffled=[...bank].sort(()=>Math.random()-0.5)
  return shuffled.slice(0,n)
}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

/* ===== EXAM MODE ===== */

let quiz=[];
let index=0;
let score=0;
let timer;
let timeLeft=2700;
let wrong=[];

function startExam(){
quiz=getRandomQuestions(questionBank,40);
index=0;
score=0;
wrong=[];
timeLeft=2700;
startTimer();
showQuestion();
}

function startTimer(){
updateTimer();
clearInterval(timer);

timer=setInterval(()=>{
timeLeft--;
updateTimer();
if(timeLeft<=0)finishExam();
},1000);
}

function updateTimer(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText=`Temps restant: ${m}:${s.toString().padStart(2,'0')}`;
}

function showQuestion(){
if(index>=quiz.length){finishExam();return}

let q=quiz[index];

let answers=q.a.map((t,i)=>({t,i}));
answers=shuffle(answers);

let html=`<h3>${index+1}/40</h3><p>${q.q}</p>`;

answers.forEach(a=>{
html+=`<button class='answer' onclick='answer(${a.i})'>${a.t}</button>`;
});

document.getElementById("progress").innerText=`Question ${index+1} / 40`;
document.getElementById("app").innerHTML=html;
}

function answer(i){
let q=quiz[index];

if(i===q.c){
score++;
}else{
wrong.push(q);
}

index++;
showQuestion();
}

function finishExam(){
clearInterval(timer);

let percent=Math.round(score/40*100);
let best=localStorage.getItem("bestScore")||0;

if(percent>best){
localStorage.setItem("bestScore",percent);
best=percent;
}

let pass=score>=32?"✅ PASS":"❌ FAIL";

let html=`
<div class='result'>
Score: ${score}/40 (${percent}%)<br>
${pass}<br><br>
Best score: ${best}%<br><br>
<button class='primary' onclick='startExam()'>Repasser</button>
<button class='secondary' onclick='reviewWrong()'>Review erreurs</button>
<button class='secondary' onclick='startFlashcards()'>Flashcards</button>
</div>`;


document.getElementById("app").innerHTML=html;
}

/* ===== REVIEW MODE ===== */

function reviewWrong(){
if(wrong.length===0){
alert("Aucune erreur 🎉");
return;
}

let html="<h3>Questions incorrectes</h3>";

wrong.forEach(q=>{
html+=`<div class='review'><b>${q.q}</b><br>Bonne réponse: ${q.a[q.c]}</div>`;
});

html+="<br><button class='primary' onclick='startExam()'>Nouvel examen</button>";


document.getElementById("app").innerHTML=html;
}

/* ===== FLASHCARD MODE ===== */

let flashIndex=0;

function startFlashcards(){
quiz=shuffle([...questionBank]).slice(0,20);
flashIndex=0;
showFlash();
}

function showFlash(){
if(flashIndex>=quiz.length){
startScreen();
return;
}

let q=quiz[flashIndex];

let html=`
<div class='flashcard'>
${q.q}<br><br>
<button class='primary' onclick='showFlashAnswer()'>Voir réponse</button>
</div>`;


document.getElementById("app").innerHTML=html;
}

function showFlashAnswer(){
let q=quiz[flashIndex];

let html=`
<div class='flashcard'>
<b>${q.a[q.c]}</b><br><br>
<button class='primary' onclick='nextFlash()'>Suivant</button>
</div>`;


document.getElementById("app").innerHTML=html;
}

function nextFlash(){
flashIndex++;
showFlash();
}

/* ===== HOME ===== */

function startScreen(){

let html=`
<div style='text-align:center'>
<h2>Simulation Examen Civique</h2>
<p>40 questions • 45 minutes</p>
<button class='primary' onclick='startExam()'>Commencer examen</button>
<br>
<button class='secondary' onclick='startFlashcards()'>Mode Flashcards</button>
</div>`;


document.getElementById("app").innerHTML=html;
}

startScreen();

</script>
</body>
</html>
