{q:"Justice ?",a:["Tribunal","Entreprise","Police","TV"],c:0}
]

/* =========================
ENGINE
========================= */

function pick(arr,n){
 return [...arr].sort(()=>Math.random()-0.5).slice(0,n)
}

let quiz=[],i=0,score=0,wrong=[],time=2700,timer

function start(){
quiz=[...pick(knowledge,28),...pick(situation,12)].sort(()=>Math.random()-0.5)
i=0;score=0;wrong=[];time=2700
startTimer()
show()
}

function startTimer(){
clearInterval(timer)
timer=setInterval(()=>{
time--
let m=Math.floor(time/60),s=time%60
document.getElementById("timer").innerText=m+":"+String(s).padStart(2,"0")
if(time<=0)end()
},1000)
}

function show(){
if(i>=quiz.length)return end()
let q=quiz[i]
let ans=q.a.map((t,idx)=>({t,idx})).sort(()=>Math.random()-0.5)

let html="<h3>"+(i+1)+"/40</h3><p>"+q.q+"</p>"
ans.forEach(a=>{
html+="<button class='answer' onclick='answer("+a.idx+")'>"+a.t+"</button>"
})
document.getElementById("app").innerHTML=html
}

function answer(x){
if(x===quiz[i].c)score++
else wrong.push(quiz[i])
i++
show()
}

function end(){
clearInterval(timer)
let html="<h2>"+score+"/40</h2>"
html+="<button class='primary' onclick='start()'>Repasser</button>"
html+="<button onclick='review()'>Review erreurs</button>"
document.getElementById("app").innerHTML=html
}

function review(){
let html="<h3>Erreurs</h3>"
wrong.forEach(q=>{
html+="<p>"+q.q+"<br><b>"+q.a[q.c]+"</b></p>"
})
document.getElementById("app").innerHTML=html
}

start()

</script>
